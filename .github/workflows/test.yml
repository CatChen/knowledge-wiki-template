name: Tests

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: wiki-index.mjs
        run: bash .github/tests/wiki-index.sh

      - name: wiki-state.mjs
        run: bash .github/tests/wiki-state.sh
