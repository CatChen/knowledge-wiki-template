name: wiki-state.mjs Tests

on:
  workflow_call:

jobs:
  find-unprocessed-summaries--empty:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-state--find-unprocessed-summaries--empty
      command: node scripts/wiki/wiki-state.mjs find-unprocessed-summaries knowledge-wiki-concept

  find-unprocessed-summaries--first-run:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-state--find-unprocessed-summaries--first-run
      command: node scripts/wiki/wiki-state.mjs find-unprocessed-summaries knowledge-wiki-concept

  find-unprocessed-summaries--after-last-run:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-state--find-unprocessed-summaries--after-last-run
      command: node scripts/wiki/wiki-state.mjs find-unprocessed-summaries knowledge-wiki-concept

  find-unprocessed-summaries--no-date:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-state--find-unprocessed-summaries--no-date
      command: node scripts/wiki/wiki-state.mjs find-unprocessed-summaries knowledge-wiki-concept

  set-last-run--knowledge-wiki-concept:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-state--set-last-run--knowledge-wiki-concept
      command: node scripts/wiki/wiki-state.mjs set-last-run knowledge-wiki-concept

  dismiss-pair--merge:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-state--dismiss-pair--merge
      command: node scripts/wiki/wiki-state.mjs dismiss-pair knowledge-wiki-merge "Wiki/Concepts/foo.md" "Wiki/Concepts/bar.md"

  prune-merge-pairs:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-state--prune-merge-pairs
      command: node scripts/wiki/wiki-state.mjs prune-merge-pairs

  dismiss-pair--cluster:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-state--dismiss-pair--cluster
      command: node scripts/wiki/wiki-state.mjs dismiss-pair knowledge-wiki-cluster "Wiki/Concepts/parent.md" "Wiki/Concepts/child.md"

  prune-cluster-pairs--no-parent:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-state--prune-cluster-pairs--no-parent
      command: node scripts/wiki/wiki-state.mjs prune-cluster-pairs

  prune-cluster-pairs--no-descendants:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-state--prune-cluster-pairs--no-descendants
      command: node scripts/wiki/wiki-state.mjs prune-cluster-pairs

  prune-cluster-pairs--has-descendants:
    uses: ./.github/workflows/wiki-test-runner.yml
    with:
      test: wiki-state--prune-cluster-pairs--has-descendants
      command: node scripts/wiki/wiki-state.mjs prune-cluster-pairs
