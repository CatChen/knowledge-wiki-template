name: Wiki Test Runner

on:
  workflow_call:
    inputs:
      test:
        required: true
        type: string
        description: >
          Test case name. Maps to .github/tests/<name>/ which may contain:
            fixture/   — copied to repo root before running the command
            expected/  — each file is diffed against the corresponding repo-root file
            expected.json — diffed against the command's stdout (JSON-normalized)
      command:
        required: true
        type: string
        description: Shell command to run (e.g. "node scripts/wiki/wiki-index.mjs sort")

jobs:
  run:
    runs-on: ubuntu-latest
    name: ${{ inputs.test }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Copy fixture
        run: |
          FIXTURE=".github/tests/${{ inputs.test }}/fixture"
          if [ -d "$FIXTURE" ]; then
            cp -r "$FIXTURE/." .
          fi

      - name: Run command
        run: ${{ inputs.command }} > /tmp/stdout.txt

      - name: Assert files
        run: |
          EXPECTED=".github/tests/${{ inputs.test }}/expected"
          [ -d "$EXPECTED" ] || exit 0
          # diff -r each subdirectory of expected/ against its counterpart at
          # the repo root. This is bidirectional: missing files and unexpected
          # extra files both cause a failure.
          FAIL=0
          for entry in "$EXPECTED"/*/; do
            [ -d "$entry" ] || continue
            dir=$(basename "$entry")
            if [ ! -d "$dir" ]; then
              echo "Missing expected directory: $dir"
              FAIL=1
            elif ! diff -r "$entry" "$dir"; then
              echo "Directory mismatch: $dir"
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ]

      - name: Assert JSON output
        run: |
          EXPECTED=".github/tests/${{ inputs.test }}/expected.json"
          [ -f "$EXPECTED" ] || exit 0
          diff <(jq -S . "$EXPECTED") <(jq -S . /tmp/stdout.txt)

      - name: Run assert script
        run: |
          ASSERT=".github/tests/${{ inputs.test }}/assert.sh"
          [ -f "$ASSERT" ] || exit 0
          bash "$ASSERT"
