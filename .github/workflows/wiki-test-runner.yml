name: Wiki Test Runner

on:
  workflow_call:
    inputs:
      test:
        required: true
        type: string
        description: >
          Test case name. Maps to .github/tests/<name>/ which may contain:
            fixture/      — copied to repo root before running the command
            expected/     — each subdirectory is diffed bidirectionally against repo root
            expected.json — diffed against the command's stdout (JSON-normalized)
            assert.sh     — run after other assertions for custom checks
      command:
        required: true
        type: string
        description: Shell command to run (e.g. "node scripts/wiki/wiki-index.mjs sort")

jobs:
  run:
    runs-on: ubuntu-latest
    name: ${{ inputs.test }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Copy fixture
        run: |
          FIXTURE=".github/tests/${{ inputs.test }}/fixture"
          if [ -d "$FIXTURE" ]; then
            cp -r "$FIXTURE/." .
          fi

      - name: Run command
        run: ${{ inputs.command }} > /tmp/stdout.txt

      - name: Detect assertions
        id: detect
        run: |
          TEST="${{ inputs.test }}"
          HAS_FILES=false
          HAS_JSON=false
          HAS_SCRIPT=false
          [ -d ".github/tests/$TEST/expected" ] && HAS_FILES=true
          [ -f ".github/tests/$TEST/expected.json" ] && HAS_JSON=true
          [ -f ".github/tests/$TEST/assert.sh" ] && HAS_SCRIPT=true
          if [ "$HAS_FILES" = false ] && [ "$HAS_JSON" = false ] && [ "$HAS_SCRIPT" = false ]; then
            echo "No assertions defined for test '$TEST'." >&2
            echo "Add expected/, expected.json, or assert.sh to .github/tests/$TEST/." >&2
            exit 1
          fi
          echo "has-files=$HAS_FILES" >> "$GITHUB_OUTPUT"
          echo "has-json=$HAS_JSON" >> "$GITHUB_OUTPUT"
          echo "has-script=$HAS_SCRIPT" >> "$GITHUB_OUTPUT"

      - name: Assert files
        if: steps.detect.outputs.has-files == 'true'
        run: |
          EXPECTED=".github/tests/${{ inputs.test }}/expected"
          # diff -r each subdirectory of expected/ against its counterpart at
          # the repo root. This is bidirectional: missing files and unexpected
          # extra files both cause a failure.
          FAIL=0
          for entry in "$EXPECTED"/*/; do
            [ -d "$entry" ] || continue
            dir=$(basename "$entry")
            if [ ! -d "$dir" ]; then
              echo "Missing expected directory: $dir"
              FAIL=1
            elif ! diff -r "$entry" "$dir"; then
              echo "Directory mismatch: $dir"
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ]

      - name: Assert JSON output
        if: steps.detect.outputs.has-json == 'true'
        run: |
          diff <(jq -S . ".github/tests/${{ inputs.test }}/expected.json") \
               <(jq -S . /tmp/stdout.txt)

      - name: Run assert script
        if: steps.detect.outputs.has-script == 'true'
        run: bash ".github/tests/${{ inputs.test }}/assert.sh"
